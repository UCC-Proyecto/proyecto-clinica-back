name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Build project
        run: ./mvnw clean compile
